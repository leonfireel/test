<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Shopping List</title>
</head>

<body>

<div itemscope itemtype="http://schema.org/Recipe">

  <h1 itemprop="name">Weekly Shopping List</h1>

  <div itemprop="description">Auto-generated meal plan ingredients</div>

  <div>
    <span>By </span>
    <span itemprop="author">Meal Planner Bot</span>
  </div>

  <img src="https://via.placeholder.com/300" itemprop="image"/>

  <div>
    <span>Category: </span>
    <span itemprop="recipeCategory">Shopping</span>
  </div>

  <div>
    <span>Serves: </span>
    <span itemprop="recipeYield">1 week</span>
  </div>

  <div>
    <span>Preparation time: </span>
    <span itemprop="prepTime">PT10M</span>
  </div>

  <div itemprop="nutrition" itemscope itemtype="https://schema.org/NutritionInformation">
    <span>Calories: </span>
    <span itemprop="calories">N/A</span>
  </div>

  <h3>Ingredients</h3>
  <ul>
    <li itemprop="recipeIngredient">2 tomatoes</li>
    <li itemprop="recipeIngredient">1 cucumber</li>
    <li itemprop="recipeIngredient">200g chicken</li>
    <li itemprop="recipeIngredient">1 pack rice</li>
    <li itemprop="recipeIngredient">3 eggs</li>
  </ul>

</div>

</body>
</html>
